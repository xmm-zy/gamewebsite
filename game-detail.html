  <script src="./effects.js"></script>
  <script type="module">
    import { createSupabaseClient } from "./auth.js";

    const supabase = createSupabaseClient();

    const detailRoot = document.getElementById("detailRoot");
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    if (!id) {
      detailRoot.innerHTML = `
        <div>
          <h2 class="detail-title">没有找到这个游戏</h2>
          <p class="detail-desc">可能是链接失效，或者该游戏已被删除。你可以回到游戏库重新选择。</p>
          <div class="detail-actions">
            <a class="btn" href="./games.html">返回游戏库</a>
          </div>
        </div>
      `;
    } else {
      const { data: game, error } = await supabase
        .from("game_cards")
        .select("id, user_name, user_email, title, cover, url")
        .eq("id", id)
        .maybeSingle();

      if (error || !game) {
        detailRoot.innerHTML = `
          <div>
            <h2 class="detail-title">没有找到这个游戏</h2>
            <p class="detail-desc">可能是链接失效，或者该游戏已被删除。你可以回到游戏库重新选择。</p>
            <div class="detail-actions">
              <a class="btn" href="./games.html">返回游戏库</a>
            </div>
          </div>
        `;
      } else {
        document.title = `${game.title} | 爱音的游戏小站`;
        const description = `${game.title} — 爱音的游戏小站游戏详情与开玩入口。`;
        const metaDescription = document.querySelector('meta[name="description"]');
        if (metaDescription) metaDescription.setAttribute("content", description);
        const owner = game.user_name || game.user_email || "未知用户";

        detailRoot.innerHTML = `
          <img class="detail-cover" src="${escapeHtml(game.cover)}" alt="${escapeHtml(game.title)}" />
          <div>
            <h2 class="detail-title">${escapeHtml(game.title)}</h2>
            <p class="detail-desc">
              这里是作品的「单曲页」：可写剧情梗概、亮点与操作说明。
              已绑定外链时，点击下方按钮即可开玩。
            </p>
            <p class="detail-desc" style="opacity:0.8;">上传者：${escapeHtml(owner)}</p>
            <div class="detail-actions">
              <a class="btn btn--mascot" href="${escapeHtml(game.url)}" target="_blank" rel="noopener noreferrer">开始游戏</a>
              <a class="btn alt" href="./games.html">返回游戏库</a>
            </div>
          </div>
        `;
      }
    }
  </script>
</body>
