<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号登录 | QQQ's Game Website</title>
  <meta name="description" content="使用账号密码登录 QQQ's Game Website，像 GitHub 一样管理你的账号并发布游戏。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="bgEffects" class="bg-effects"></canvas>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html">QQQ's GAME WEBSITE<span class="badge">ANONWEB.TOP</span></a>
      <nav class="menu">
        <a href="./index.html">首页</a>
        <a href="./games.html">游戏库</a>
        <a href="./devlog.html">开发日志</a>
        <a class="active" href="./auth.html">账号</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>账号中心</h1>
      <p>使用账号系统登录，避免邮箱链接跳转不稳定。</p>
    </section>

    <section class="panel" style="max-width:760px;margin:18px auto;padding:20px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <button id="showLoginBtn" class="btn" type="button">登录</button>
        <button id="showRegisterBtn" class="btn alt" type="button">注册</button>
        <button id="logoutBtn" class="btn alt" type="button" style="display:none;">退出登录</button>
      </div>
      <p id="authStatus" style="margin:0 0 14px;">未登录</p>

      <div id="loginForm">
        <div class="field">
          <label for="loginEmailInput">邮箱</label>
          <input id="loginEmailInput" type="email" placeholder="输入注册邮箱" />
        </div>
        <div class="field">
          <label for="loginPasswordInput">密码</label>
          <input id="loginPasswordInput" type="password" placeholder="输入密码" />
        </div>
        <button id="loginBtn" class="btn" type="button">登录账号</button>
      </div>

      <div id="registerForm" style="display:none;">
        <div class="field">
          <label for="registerUsernameInput">用户名（GitHub 风格）</label>
          <input id="registerUsernameInput" type="text" maxlength="20" placeholder="3-20位，小写字母/数字/下划线" />
        </div>
        <div class="field">
          <label for="registerEmailInput">邮箱</label>
          <input id="registerEmailInput" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="registerPasswordInput">密码</label>
          <input id="registerPasswordInput" type="password" placeholder="至少6位" />
        </div>
        <div class="field">
          <label for="registerPasswordConfirmInput">确认密码</label>
          <input id="registerPasswordConfirmInput" type="password" placeholder="再次输入密码" />
        </div>
        <button id="registerBtn" class="btn" type="button">创建账号</button>
      </div>
    </section>
  </main>

  <script src="./effects.js"></script>
  <script type="module">
    import { createSupabaseClient, getCurrentUser } from "./auth.js";

    const supabase = createSupabaseClient();

    const showLoginBtn = document.getElementById("showLoginBtn");
    const showRegisterBtn = document.getElementById("showRegisterBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const authStatus = document.getElementById("authStatus");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const loginEmailInput = document.getElementById("loginEmailInput");
    const loginPasswordInput = document.getElementById("loginPasswordInput");
    const loginBtn = document.getElementById("loginBtn");

    const registerUsernameInput = document.getElementById("registerUsernameInput");
    const registerEmailInput = document.getElementById("registerEmailInput");
    const registerPasswordInput = document.getElementById("registerPasswordInput");
    const registerPasswordConfirmInput = document.getElementById("registerPasswordConfirmInput");
    const registerBtn = document.getElementById("registerBtn");

    function normalizeUsername(raw) {
      return raw.trim().toLowerCase();
    }

    function isValidUsername(username) {
      return /^[a-z0-9_]{3,20}$/.test(username);
    }

    function switchTo(mode) {
      const isLogin = mode === "login";
      loginForm.style.display = isLogin ? "block" : "none";
      registerForm.style.display = isLogin ? "none" : "block";
      showLoginBtn.classList.toggle("alt", !isLogin);
      showRegisterBtn.classList.toggle("alt", isLogin);
    }

    async function refreshSessionUI() {
      const currentUser = await getCurrentUser(supabase);
      if (!currentUser) {
        authStatus.textContent = "未登录";
        logoutBtn.style.display = "none";
        return;
      }
      const profileName = currentUser.user_metadata?.nickname || currentUser.email;
      authStatus.textContent = `已登录: ${profileName}`;
      logoutBtn.style.display = "inline-block";
    }

    showLoginBtn.addEventListener("click", () => switchTo("login"));
    showRegisterBtn.addEventListener("click", () => switchTo("register"));

    registerBtn.addEventListener("click", async () => {
      const username = normalizeUsername(registerUsernameInput.value);
      const email = registerEmailInput.value.trim();
      const password = registerPasswordInput.value.trim();
      const confirmPassword = registerPasswordConfirmInput.value.trim();

      if (!isValidUsername(username)) {
        authStatus.textContent = "用户名需为 3-20 位，仅支持小写字母、数字、下划线。";
        return;
      }
      if (!email || !password) {
        authStatus.textContent = "请填写邮箱和密码。";
        return;
      }
      if (password.length < 6) {
        authStatus.textContent = "密码至少 6 位。";
        return;
      }
      if (password !== confirmPassword) {
        authStatus.textContent = "两次密码输入不一致。";
        return;
      }

      const { data: sameUsernameUser, error: usernameError } = await supabase
        .from("profiles")
        .select("id")
        .eq("username", username)
        .maybeSingle();
      if (usernameError) {
        authStatus.textContent = `检查用户名失败: ${usernameError.message}`;
        return;
      }
      if (sameUsernameUser) {
        authStatus.textContent = "用户名已被占用，请更换。";
        return;
      }

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { nickname: username }
        }
      });
      if (signUpError) {
        authStatus.textContent = `注册失败: ${signUpError.message}`;
        return;
      }

      const uid = signUpData.user?.id;
      if (uid) {
        await supabase.from("profiles").upsert(
          {
            id: uid,
            username,
            display_name: username,
            avatar_url: "",
            bio: ""
          },
          { onConflict: "id" }
        );
      }

      authStatus.textContent = "注册成功，请直接使用账号和密码登录。";
      switchTo("login");
      loginEmailInput.value = email;
      loginPasswordInput.value = "";
    });

    loginBtn.addEventListener("click", async () => {
      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value.trim();
      if (!email || !password) {
        authStatus.textContent = "请输入邮箱和密码。";
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });
      authStatus.textContent = error ? `登录失败: ${error.message}` : "登录成功，正在跳转...";
      if (!error) {
        window.location.href = "./games.html";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      await refreshSessionUI();
    });

    supabase.auth.onAuthStateChange(async () => {
      await refreshSessionUI();
    });

    await refreshSessionUI();
  </script>
</body>
</html>
