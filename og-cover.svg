<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="爱音的游戏小站 — 社交封面（抽象舞台灯与花瓣，非角色立绘）">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5fc"/>
      <stop offset="50%" stop-color="#ffd0ea"/>
      <stop offset="100%" stop-color="#ff8eb8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.1" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stage" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff9ec8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6a9a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <ellipse cx="600" cy="120" rx="520" ry="180" fill="url(#stage)"/>

  <g fill="#ffffff" opacity="0.9">
    <circle cx="128" cy="88" r="4"/>
    <circle cx="220" cy="62" r="3"/>
    <circle cx="1088" cy="102" r="3.5"/>
    <circle cx="1045" cy="168" r="2.5"/>
    <circle cx="910" cy="520" r="3"/>
  </g>

  <g fill="#ff7eb3" opacity="0.45">
    <ellipse cx="160" cy="200" rx="20" ry="11" transform="rotate(-18 160 200)"/>
    <ellipse cx="1040" cy="240" rx="16" ry="10" transform="rotate(22 1040 240)"/>
    <ellipse cx="1000" cy="500" rx="14" ry="8" transform="rotate(-16 1000 500)"/>
    <ellipse cx="320" cy="550" rx="15" ry="9" transform="rotate(26 320 550)"/>
  </g>

  <rect x="800" y="40" width="360" height="64" rx="32" fill="#ffffff" fill-opacity="0.85"/>
  <text x="980" y="81" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#c42e6a">anonweb.top</text>

  <text x="80" y="270" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#b82868">爱音的游戏小站</text>
  <text x="82" y="332" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="36" font-weight="600" fill="#6e3558">千早爱音印象 · 独立游戏舞台</text>
  <text x="82" y="384" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="26" fill="#6b4a5f">MyGO 风粉色灯效 · 游戏库与开发日志</text>

  <rect x="80" y="450" width="300" height="64" rx="32" fill="#ffffff" fill-opacity="0.92"/>
  <text x="230" y="492" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#c42e6a">开始浏览</text>
</svg>
